name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: |
            scripts/*.sh
            install-hermes.sh
          ignore_paths: SC1091

  validate-readme:
    name: Validate README Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check README exists and has content
        run: |
          if [ ! -s README.md ]; then exit 1; fi
          if ! grep -q "For AI Agent Users" README.md; then exit 1; fi
          if ! grep -q "Configuration" README.md; then exit 1; fi
          echo "README structure validated."

  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
