name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          files: |
            scripts/*.sh
            install-hermes.sh
          ignore: SC1091  # not following sourced files

  validate-readme:
    name: Validate README Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README exists and has content
        run: |
          if [ ! -s README.md ]; then exit 1; fi
          if ! grep -q "Quick Start" README.md; then exit 1; fi
          if ! grep -q "Configuration" README.md; then exit 1; fi
          echo "README structure validated."

  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v13
        with:
          files: "**/*.md"
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
